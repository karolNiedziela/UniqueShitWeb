<mat-toolbar class="header-toolbar">

  <div class="left-buttons">
    <a mat-button class="home-button" href="/">UniqueShit</a>
  
    <a
      mat-stroked-button
      [routerLink]="['/offers-list']"
      routerLinkActive="router-link-active"
      >Offers
    </a>
  
     <a
     mat-stroked-button
      [routerLink]="['/offers-list']"
      routerLinkActive="router-link-active"
      >Purchase offers
     </a>

     <button
     mat-icon-button
     [matMenuTriggerFor]="appMenu">
     <mat-icon>more_vert</mat-icon>
   </button>
   
   <mat-menu #appMenu="matMenu">
    
      <button mat-menu-item [routerLink]="['/offers-list']">
        <mat-icon> monetization_on</mat-icon>
       Sale offers
      </button>

      <button mat-menu-item [routerLink]="['/offers-list']">
        <mat-icon>whatshot</mat-icon>
        Purchase offers
      </button>

     <ng-container *ngIf="loginDisplay">

       <button mat-menu-item [routerLink]="['/saleofferform']">
        <mat-icon>add_box</mat-icon>
        Add sale offer
       </button>

       <button mat-menu-item [routerLink]="['/webapi']">
        <mat-icon>add_circle</mat-icon>
        Add purchase offer
       </button>

     </ng-container>
   </mat-menu>
  </div>
  
  <div class="middle-buttons" >
    @if (loginDisplay) {
      <a
        mat-stroked-button
        [routerLink]="['/saleofferform']"
        routerLinkActive="router-link-active">
        Add sale offer
      </a>
    }
  
    @if (loginDisplay) {
      <a
        mat-stroked-button
        [routerLink]="['/webapi']"
        routerLinkActive="router-link-active">
        Add purchase offer
      </a>
    }
  </div>
  
  
  <div class="right-buttons">
    @if (loginDisplay) {
      <a
        mat-stroked-button
        [routerLink]="['/profile']"
        routerLinkActive="router-link-active">
        Profile
      </a>
    }
  
    <button mat-raised-button *ngIf="!loginDisplay" (click)="login()">
      Login
    </button>
    
    <button mat-raised-button *ngIf="loginDisplay" (click)="logout()">
      Logout
    </button>
  
  
    <button mat-icon-button [mat-menu-trigger-for]="themeMenu">
      <mat-icon>{{ themeService.selectedTheme()?.icon }}</mat-icon>
    </button>
  
    <mat-menu #themeMenu="matMenu">
      @for (theme of themeService.getThemes(); track theme.name) {
      <button
        [class.selected-theme]="themeService.selectedTheme()?.name === theme.name"
        mat-menu-item
        (click)="themeService.setTheme(theme.name)"
      >
        <mat-icon>{{ theme.icon }}</mat-icon>
        <span>{{ theme.name | titlecase }}</span>
      </button>
      }
    </mat-menu>
  </div>
  </mat-toolbar>
